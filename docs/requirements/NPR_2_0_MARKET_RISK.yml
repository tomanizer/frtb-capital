      - src/frtb_ima/rfet.py
      - src/frtb_ima/rfet_evidence.py
    tests:
      - tests/test_rfet_evidence.py
    notes: "Evidence packages, source presence, bucket representativeness, and one-count-per-date are implemented; vendor reliance and advanced representativeness remain open."

  - id: NPR-MR-RFET-003
    title: "New-issuance RFET prorating"
    source: "RFET treatment for new issuances"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: partial
    modules:
      - src/frtb_ima/rfet_evidence.py
    tests:
      - tests/test_rfet_evidence.py
    notes: "Opt-in prorated threshold helper implemented as a documented working assumption; final supervisory interpretation still needs confirmation."

  - id: NPR-MR-IMCC-001
    title: "IMCC constrained and unconstrained aggregation"
    source: "Models-based non-default capital requirement"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
