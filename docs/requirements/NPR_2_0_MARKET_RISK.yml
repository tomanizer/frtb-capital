requirements:
  - id: NPR-MR-DATA-001
    title: "Validated vector-friendly market-risk data contracts"
    source: "NPR market-risk workflow input and audit traceability"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
      - src/frtb_ima/data_contracts.py
      - src/frtb_ima/data_models.py
      - src/frtb_ima/scenario.py
    tests:
      - tests/test_data_contracts.py
      - tests/test_scenario.py
    notes: "Defines positions, risk-factor definitions, RFET evidence packages, scenario cubes, desk runs, and capital run result containers."

  - id: NPR-MR-POLICY-001
    title: "Run-level immutable regulatory policy"
    source: "NPR market-risk framework; cross-regime traceability model"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
      - src/frtb_ima/regimes.py
    tests:
      - tests/test_regimes.py
    notes: "Fed NPR 2.0 is default; ECB/PRA profiles are explicit partial profiles."

  - id: NPR-MR-ES-001
    title: "97.5 percent empirical expected shortfall"
    source: "Expected-shortfall-based measure for model-eligible positions"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
      - src/frtb_ima/expected_shortfall.py
    tests:
      - tests/test_expected_shortfall.py
    notes: "Simple empirical tail mean; interpolation/weighting conventions remain policy-review items."

  - id: NPR-MR-LHA-001
    title: "Liquidity-horizon adjusted ES from nested scenario vectors"
    source: "Proposed Sec. __.215 liquidity horizon adjusted expected shortfall"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
      - src/frtb_ima/lha_builder.py
      - src/frtb_ima/liquidity_horizon.py
      - src/frtb_ima/scenario_validation.py
    tests:
      - tests/test_lha_builder.py
      - tests/test_liquidity_horizon.py
      - tests/test_scenario_validation.py
    notes: "Scenario cube to nested-vector construction and LHA calculation are implemented."

  - id: NPR-MR-LHA-002
    title: "Risk-factor to liquidity-horizon mapping tables"
    source: "Proposed Sec. __.215 liquidity horizon tables"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
      - src/frtb_ima/liquidity_horizon_mapping.py
    tests:
      - tests/test_liquidity_horizon_mapping.py
    notes: "Fed NPR 2.0 / Basel working-assumption mapping table implemented for caller-supplied regulatory categories, including short-maturity and weighted-average multi-underlying helpers. Trade/vendor-to-category classification remains upstream."

  - id: NPR-MR-RFET-001
    title: "RFET quantitative observation thresholds"
    source: "Risk factor eligibility test real-price observation thresholds"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
