      - src/frtb_ima/regimes.py
    tests:
      - tests/test_rfet.py
      - tests/test_regimes.py
    notes: "Implements 24 short-LH and 16 long-LH unique-date count thresholds."

  - id: NPR-MR-RFET-002
    title: "RFET evidence lineage, source de-duplication, and representativeness"
    source: "RFET real-price evidence and data-quality standards"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: partial
    modules:
