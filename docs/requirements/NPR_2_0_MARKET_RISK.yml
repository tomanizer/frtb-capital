      - src/frtb_ima/regimes.py
    tests:
      - tests/test_backtesting.py
      - tests/test_regimes.py
    notes: "Includes missing-data exception treatment and optional prorated short-history thresholds."

  - id: NPR-MR-BT-002
    title: "Dated backtesting exception trace and business calendar"
    source: "Backtesting operational traceability"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
