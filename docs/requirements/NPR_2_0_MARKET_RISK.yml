      - tests/test_lha_builder.py
      - tests/test_regimes.py
    notes: "Scalar API and audit decomposition implemented for unconstrained, constrained, and blended IMCC."

  - id: NPR-MR-IMCC-002
    title: "Current/stress period ES and reduced-set governance"
    source: "Full/reduced risk-factor set stress scaling and coverage tests"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: partial
    modules:
      - src/frtb_ima/imcc.py
      - src/frtb_ima/reduced_set.py
    tests:
      - tests/test_imcc.py
      - tests/test_reduced_set.py
    notes: "Reduced/full set scaling helper and 60-day 75% variation-explained diagnostic implemented; stress-window selection is tracked separately in NPR-MR-STRESS-001; no reduced risk-factor set selection workflow yet."

  - id: NPR-MR-STRESS-001
    title: "Stress-period determination from supplied historical loss series"
    source: "Stressed ES / SES calibration window selection by risk class"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: partial
    modules:
      - src/frtb_ima/stress_periods.py
      - src/frtb_ima/nmrf_stress_spec.py
    tests:
      - tests/test_stress_periods.py
      - tests/test_nmrf_stress_spec.py
    notes: "Vectorized common stress-window selection by risk class is implemented from supplied historical loss/severity vectors, including NMRFStressPeriodSpec bridging. Raw market-data sourcing, exact business-calendar semantics, source-completeness proof, formal calibration approval, and trade pricing remain upstream."

  - id: NPR-MR-NMRF-001
    title: "Type A and Type B SES aggregation"
    source: "Proposed stressed expected shortfall SES formula"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
      - src/frtb_ima/nmrf.py
      - src/frtb_ima/regimes.py
    tests:
      - tests/test_nmrf.py
      - tests/test_regimes.py
    notes: "Type A zero-correlation and Type B rho=0.36 aggregation implemented."

  - id: NPR-MR-NMRF-002
    title: "NMRF direct, stepwise, and full-revaluation stress scenarios"
    source: "Stress scenario capital measure for each non-modellable risk factor"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: partial
    modules:
      - src/frtb_ima/nmrf.py
      - src/frtb_ima/nmrf_method_selection.py
      - src/frtb_ima/nmrf_stress_spec.py
      - src/frtb_ima/nmrf_valuation_run.py
    tests:
      - tests/test_nmrf.py
      - tests/test_nmrf_method_selection.py
      - tests/test_nmrf_stress_spec.py
      - tests/test_nmrf_valuation_run.py
    notes: "NMRF method evidence, valuation instructions, upstream valuation-run specs, valuation-run artifact reconciliation, vectorized stress-artifact SES extraction, and Type A/B capital routing are implemented. The capital layer consumes upstream direct/stepwise/full-revaluation artifacts but cannot generate or price them; generation raises UnsupportedRegulatoryFeatureError. Prototype linear sensitivity helper remains approximation-only."

