requirements:
  - id: NPR-MR-DATA-001
    title: "Validated vector-friendly market-risk data contracts"
    source: "NPR market-risk workflow input and audit traceability"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
      - src/frtb_ima/data_contracts.py
      - src/frtb_ima/data_models.py
      - src/frtb_ima/scenario.py
    tests:
      - tests/test_data_contracts.py
      - tests/test_scenario.py
    notes: "Defines positions, risk-factor definitions, RFET evidence packages, scenario cubes, desk runs, and capital run result containers."

  - id: NPR-MR-POLICY-001
    title: "Run-level immutable regulatory policy"
    source: "NPR market-risk framework; cross-regime traceability model"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
      - src/frtb_ima/regimes.py
    tests:
      - tests/test_regimes.py
    notes: "Fed NPR 2.0 is default; ECB/PRA profiles are explicit partial profiles."

  - id: NPR-MR-ES-001
    title: "97.5 percent empirical expected shortfall"
    source: "Expected-shortfall-based measure for model-eligible positions"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
      - src/frtb_ima/expected_shortfall.py
    tests:
      - tests/test_expected_shortfall.py
    notes: "Simple empirical tail mean; interpolation/weighting conventions remain policy-review items."

  - id: NPR-MR-LHA-001
    title: "Liquidity-horizon adjusted ES from nested scenario vectors"
    source: "Proposed Sec. __.215 liquidity horizon adjusted expected shortfall"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
      - src/frtb_ima/lha_builder.py
      - src/frtb_ima/liquidity_horizon.py
      - src/frtb_ima/scenario_validation.py
    tests:
      - tests/test_lha_builder.py
      - tests/test_liquidity_horizon.py
      - tests/test_scenario_validation.py
    notes: "Scenario cube to nested-vector construction and LHA calculation are implemented."

  - id: NPR-MR-LHA-002
    title: "Risk-factor to liquidity-horizon mapping tables"
    source: "Proposed Sec. __.215 liquidity horizon tables"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: unsupported
    modules:
      - src/frtb_ima/data_models.py
    tests:
    notes: "Current code stores assigned liquidity horizons but does not implement regulatory mapping tables."

  - id: NPR-MR-RFET-001
    title: "RFET quantitative observation thresholds"
    source: "Risk factor eligibility test real-price observation thresholds"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
      - src/frtb_ima/rfet.py
      - src/frtb_ima/regimes.py
    tests:
      - tests/test_rfet.py
      - tests/test_regimes.py
    notes: "Implements 24 short-LH and 16 long-LH unique-date count thresholds."

  - id: NPR-MR-RFET-002
    title: "RFET evidence lineage, source de-duplication, and representativeness"
    source: "RFET real-price evidence and data-quality standards"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: partial
    modules:
      - src/frtb_ima/data_models.py
      - src/frtb_ima/rfet.py
      - src/frtb_ima/rfet_evidence.py
    tests:
      - tests/test_rfet_evidence.py
    notes: "Evidence packages, source presence, bucket representativeness, and one-count-per-date are implemented; vendor reliance and advanced representativeness remain open."

  - id: NPR-MR-RFET-003
    title: "New-issuance RFET prorating"
    source: "RFET treatment for new issuances"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: partial
    modules:
      - src/frtb_ima/rfet_evidence.py
    tests:
      - tests/test_rfet_evidence.py
    notes: "Opt-in prorated threshold helper implemented as a documented working assumption; final supervisory interpretation still needs confirmation."

  - id: NPR-MR-IMCC-001
    title: "IMCC constrained and unconstrained aggregation"
    source: "Models-based non-default capital requirement"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
      - src/frtb_ima/imcc.py
      - src/frtb_ima/lha_builder.py
      - src/frtb_ima/liquidity_horizon.py
    tests:
      - tests/test_imcc.py
      - tests/test_lha_builder.py
      - tests/test_regimes.py
    notes: "Scalar result implemented; richer IMCC decomposition is tracked separately."

  - id: NPR-MR-IMCC-002
    title: "Current/stress period ES and reduced-set governance"
    source: "Full/reduced risk-factor set stress scaling and coverage tests"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: partial
    modules:
      - src/frtb_ima/imcc.py
    tests:
      - tests/test_imcc.py
    notes: "Scaling helper exists; no stress-window selection, 75-factor reduced-set selection, or coverage governance yet."

  - id: NPR-MR-NMRF-001
    title: "Type A and Type B SES aggregation"
    source: "Proposed stressed expected shortfall SES formula"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
      - src/frtb_ima/nmrf.py
      - src/frtb_ima/regimes.py
    tests:
      - tests/test_nmrf.py
      - tests/test_regimes.py
    notes: "Type A zero-correlation and Type B rho=0.36 aggregation implemented."

  - id: NPR-MR-NMRF-002
    title: "NMRF direct, stepwise, and full-revaluation stress scenarios"
    source: "Stress scenario capital measure for each non-modellable risk factor"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: unsupported
    modules:
      - src/frtb_ima/nmrf.py
    tests:
    notes: "Current SES inputs use linear sensitivity shocks only."

  - id: NPR-MR-PLA-001
    title: "NPR KS-based PLA assessment"
    source: "Profit and loss attribution over HPL and RTPL vectors"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
    modules:
      - src/frtb_ima/pla.py
      - src/frtb_ima/regimes.py
    tests:
      - tests/test_pla.py
      - tests/test_regimes.py
    notes: "KS metric and 250-day policy window implemented for Fed profile."

  - id: NPR-MR-PLA-002
    title: "EU/PRA Spearman PLA metric"
    source: "EU RTS/PRA profile comparison gap"
    source_url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32022R2059"
    status: unsupported
    modules:
      - src/frtb_ima/pla.py
      - src/frtb_ima/regimes.py
    tests:
      - tests/test_regimes.py
    notes: "Explicit unsupported-feature behavior exists; metric not implemented."

  - id: NPR-MR-BT-001
    title: "Trading-desk backtesting gates at 97.5 and 99 percent VaR"
    source: "APL/HPL exception counts over 250 business days"
    source_url: "https://www.govinfo.gov/content/pkg/FR-2026-03-27/html/2026-05959.htm"
    status: implemented
