    coverage_status: implemented_under_audit
    notes: Proposed U.S. section V.B profile has package-local citations, metadata, support-matrix rows, and synthetic BA-CVA/SA-CVA public API runs. Outputs are comparison evidence, not final U.S. regulatory capital.
  - id: CVA-EU-001
