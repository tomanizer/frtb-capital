    test_refs:
      - packages/frtb-cva/tests/test_cva_hedges.py
    coverage_status: implemented_under_audit
    notes: BA-CVA and SA-CVA hedge benefit is explicit and cited for Basel MAR50. U.S. NPR section V.B mapping remains deferred to the unsupported U.S. comparison profile.
  - id: CVA-US-001
    topic: U.S. NPR 2.0 CVA comparison profile
    detailed_ids: [CVA-FUNC-006]
    source_refs:
