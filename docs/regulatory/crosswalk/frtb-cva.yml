requirements:
  - id: CVA-POLICY-001
    topic: CVA capital approach selection and Basel MAR50 profile
    detailed_ids: [CVA-FUNC-006, CVA-FUNC-001]
    source_refs:
      - basel_mar50
      - bcbs_d507_cva_revisions_2020
    code_refs:
      - packages/frtb-cva/src/frtb_cva/scope.py
      - packages/frtb-cva/src/frtb_cva/regimes.py
      - packages/frtb-cva/src/frtb_cva/support_matrix.py
    test_refs:
      - packages/frtb-cva/tests/test_cva_scope.py
      - packages/frtb-cva/tests/test_cva_regimes.py
      - packages/frtb-cva/tests/test_cva_support_matrix.py
      - packages/frtb-cva/tests/test_cva_profile_evidence_fixture.py
    coverage_status: implemented_under_audit
    challenger_refs:
      - frtb_net_frtb
    notes: BASEL_MAR50_2020 is the calibration anchor. US_NPR20_VB, EU_CRR3_CVA, and UK_PRA_CVA are capital-producing comparison profiles with profile-owned citation ids and deterministic hashes; ECB shorthand routes to EU_CRR3_CVA.
  - id: CVA-BA-001
    topic: Reduced and full BA-CVA capital mechanics
    detailed_ids: [CVA-FUNC-008, CVA-FUNC-009, CVA-FUNC-010]
    source_refs:
      - basel_mar50
    code_refs:
      - packages/frtb-cva/src/frtb_cva/ba_cva.py
    test_refs:
      - packages/frtb-cva/tests/test_cva_ba_cva_reduced.py
      - packages/frtb-cva/tests/test_cva_ba_cva_full.py
      - packages/frtb-cva/tests/test_cva_extended_challenger_fixture.py
    coverage_status: implemented_under_audit
    notes: Reduced and full BA-CVA are capital-producing for supported Basel MAR50 and comparison-profile inputs, including eligible hedge recognition and beta-floor mechanics.
  - id: CVA-SA-001
    topic: SA-CVA sensitivity weighting and aggregation
    detailed_ids: [CVA-FUNC-012, CVA-FUNC-013, CVA-FUNC-014]
    source_refs:
      - basel_mar50
    code_refs:
      - packages/frtb-cva/src/frtb_cva/weighted_sensitivity.py
      - packages/frtb-cva/src/frtb_cva/aggregation.py
    test_refs:
      - packages/frtb-cva/tests/test_cva_weighted_sensitivity.py
      - packages/frtb-cva/tests/test_cva_aggregation.py
      - packages/frtb-cva/tests/test_cva_extended_challenger_fixture.py
    coverage_status: implemented_under_audit
    notes: Weighted sensitivity netting and shared aggregation are implemented for supported SA-CVA paths; net WS uses the minus sign under the positive CVA convention (MAR50.52).
  - id: CVA-SA-RISK-001
    topic: SA-CVA risk-class modules
    detailed_ids: [CVA-FUNC-015, CVA-FUNC-016, CVA-FUNC-017, CVA-FUNC-018, CVA-FUNC-019, CVA-FUNC-020]
    source_refs:
      - basel_mar50
    code_refs:
      - packages/frtb-cva/src/frtb_cva/risk_classes
    test_refs:
      - packages/frtb-cva/tests/risk_classes
      - packages/frtb-cva/tests/test_cva_extended_challenger_fixture.py
    coverage_status: implemented_under_audit
    notes: SA-CVA supports GIRR, FX, RCS, equity, and commodity delta/vega plus CCS delta; CCS vega is explicitly unsupported because MAR50.45 and MAR50.63 do not define it.
  - id: CVA-HEDGE-001
    topic: Eligible CVA hedges and internal transfers
    detailed_ids: [CVA-FUNC-007, CVA-BOUNDARY-006]
    source_refs:
      - basel_mar50
      - us_npr20_91fr14952
      - eu_crr3_2024_1623
      - uk_pra_cva_risk_part
    code_refs:
      - packages/frtb-cva/src/frtb_cva/hedges.py
    test_refs:
      - packages/frtb-cva/tests/test_cva_hedges.py
      - packages/frtb-cva/tests/test_cva_extended_challenger_fixture.py
    coverage_status: implemented_under_audit
    notes: BA-CVA and SA-CVA hedge benefit is explicit and cited for Basel MAR50 plus the supported U.S. NPR, EU CRR3, and UK PRA comparison profiles.
  - id: CVA-US-001
    topic: U.S. NPR 2.0 CVA comparison profile
    detailed_ids: [CVA-FUNC-006]
    source_refs:
