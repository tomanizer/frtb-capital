schema_version: 1
name: BASEL_FRTB_DRC
module: frtb-drc
status_values: [planned, implemented, partial, unsupported, out_of_scope]
source_register:
  - name: Basel MAR22
    url: https://www.bis.org/basel_framework/chapter/MAR/22.htm
  - name: U.S. NPR 2.0 91 FR 14952
    url: https://www.govinfo.gov/app/details/FR-2026-03-27/2026-05959
  - name: CRR3 Regulation (EU) 2024/1623
    url: https://eur-lex.europa.eu/eli/reg/2024/1623/oj/eng
  - name: EBA RTS on gross jump-to-default amounts
    url: https://www.eba.europa.eu/legacy/regulation-and-policy/regulatory-activities/market-counterparty-and-cva-risk/regulatory-3
requirements:
  - id: DRC-DATA-001
    title: Frozen DRC input and result models
    source: Basel MAR22.1-MAR22.8; U.S. NPR 2.0 section V.A.9
    status: implemented
    modules: [src/frtb_drc/data_models.py]
    tests: [tests/test_drc_data_models.py]
    notes: Frozen position, lineage, risk-weight evidence, GrossJtd, MaturityScaledJtd, NetJtd, BucketDrc, CategoryDrc, and DrcCapitalResult records are implemented with stable ids and branch metadata.
  - id: DRC-REF-001
    title: Regime-specific LGD and risk-weight reference data
    source: Basel MAR22.12, MAR22.19-MAR22.26; 91 FR 15068
    status: partial
    modules: [src/frtb_drc/reference_data.py, src/frtb_drc/regimes.py]
    tests: [tests/test_drc_reference_data.py]
    notes: U.S. NPR 2.0 non-securitisation LGD, maturity, bucket, and risk-weight reference data are implemented with citations. Basel MAR22 non-securitisation LGD, MAR22.15-MAR22.18 maturity scaling, MAR22.22 bucket definitions, and MAR22.24 letter-grade risk weights are implemented for row and batch paths. U.S. NPR 2.0 securitisation non-CTP and CTP consume typed upstream DrcRiskWeightEvidence; U.S. NPR 2.0 securitisation non-CTP also consumes typed DrcFairValueCapEvidence where the profile control permits optional cap treatment. Basel MAR22 securitisation non-CTP and CTP fail closed pending MAR22.34/MAR22.42 banking-book securitisation mappings and decomposition contracts. EU CRR3 and PRA UK CRR profiles are known but fail closed pending Article 325w / PRA PS1/26 rulebook mappings.
  - id: DRC-JTD-001
    title: Gross JTD and default long-short direction
    source: Basel MAR22.9-MAR22.12; U.S. NPR 2.0 section V.A.9.a.i
    status: partial
    modules: [src/frtb_drc/gross_jtd.py]
    tests: [tests/test_drc_gross_jtd.py]
    notes: Supported for non-securitisation positions with source values, LGD source, gross JTD ids, and citation metadata preserved in audit output.
  - id: DRC-NET-001
    title: Net JTD by obligor, seniority, tranche, and maturity
    source: Basel MAR22.13-MAR22.18; U.S. NPR 2.0 section V.A.9 steps two and three
    status: partial
    modules: [src/frtb_drc/netting.py, src/frtb_drc/securitisation.py, src/frtb_drc/ctp.py]
    tests: [tests/test_drc_netting.py, tests/test_drc_securitisation.py, tests/test_drc_ctp.py]
    notes: Supported for non-securitisation obligor and seniority grouping, securitisation non-CTP same-pool/same-tranche and explicit replication-group netting, and CTP explicit replication-group netting, including rejected-offset audit records.
  - id: DRC-CAP-001
    title: Hedge benefit ratio and bucket capital
    source: Basel MAR22.21-MAR22.26; U.S. NPR 2.0 section V.A.9 step four
    status: partial
    modules: [src/frtb_drc/capital.py]
    tests: [tests/test_drc_capital.py]
    notes: Supported for non-securitisation bucket capital, hedge benefit ratio, floors, weighted long/short components, and category reconciliation.
  - id: DRC-SEC-001
    title: Securitisation non-CTP DRC
    source: Basel MAR22.27-MAR22.35; U.S. NPR 2.0 proposed section __.210(c)
    status: partial
    modules: [src/frtb_drc/securitisation.py, src/frtb_drc/risk_weight_evidence.py, src/frtb_drc/fair_value_cap.py]
    tests: [tests/test_drc_securitisation.py, tests/test_drc_arrow_batch.py]
    notes: Supported row and batch paths cover market-value gross default exposure, profile-controlled optional fair-value cap evidence, maturity scaling, same-pool/same-tranche netting, explicit replication-group evidence, securitisation bucket taxonomy, HBR, bucket floors, and category summation. Banking-book securitisation risk weights are supplied as cited DrcRiskWeightEvidence or legacy low-level run-scoped maps rather than derived internally; duplicate, missing, stale, uncited, wrong-risk-class, non-finite, negative, or future-dated evidence fails closed. Fair-value cap evidence is supplied as cited DrcFairValueCapEvidence; duplicate, unused, stale, uncited, future-dated, profile-mismatched, negative, non-finite, or incomplete evidence fails closed.
  - id: DRC-CTP-001
    title: Correlation trading portfolio DRC
    source: Basel MAR22.36-MAR22.45; U.S. NPR 2.0 proposed section __.210(d)
    status: partial
    modules: [src/frtb_drc/ctp.py, src/frtb_drc/risk_weight_evidence.py]
    tests: [tests/test_drc_ctp.py]
    notes: Supported row and batch paths cover market-value gross default exposure, explicit replication-group netting, CTP-wide HBR, unfloored buckets, and CTP category aggregation. Banking-book securitisation risk weights and decomposition evidence are supplied as cited DrcRiskWeightEvidence or legacy low-level run-scoped maps rather than derived internally.
  - id: DRC-AUDIT-001
    title: Audit and attribution-compatible decomposition
    source: Basel MAR22 traceability requirement by calculation component
    status: partial
    modules: [src/frtb_drc/audit.py, src/frtb_drc/risk_weight_evidence.py, src/frtb_drc/fair_value_cap.py]
    tests: [tests/test_drc_audit.py, tests/test_drc_securitisation.py, tests/test_drc_ctp.py]
    notes: The audit graph preserves position, gross JTD, scaled JTD, netting group, bucket, category, citations, stable ids, branch metadata, FX conversions, securitisation/CTP risk-weight evidence, and securitisation fair-value cap evidence for later analytical Euler or impact methods; attribution math is not implemented in the capital kernel.
