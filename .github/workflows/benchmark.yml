name: Benchmark

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
  pull_request:
    branches: [main]
    # Only perf-sensitive surfaces. Structural budgets (accepted-row dataclass
    # counts, row/batch capital deltas, hash equalities) are exact; wall-clock
    # budgets carry 2x-4x tolerance, so a shared PR runner does not flake.
    paths:
      - "packages/**/src/**/batch.py"
      - "packages/**/src/**/arrow_batch.py"
      - "packages/**/src/**/component_summary.py"
      - "packages/**/src/**/curvature.py"
      - "packages/**/src/**/weighted_sensitivity.py"
      - "packages/**/src/**/capital.py"
      - "packages/**/src/**/crif.py"
      - "packages/**/src/**/scenario.py"
      - "packages/**/src/**/rfet_evidence.py"
      - "benchmarks/**"
      - "packages/**/scripts/benchmark_*.py"
      - "scripts/benchmark_target_scale.py"
      - "scripts/ci/run_benchmark_suite.py"
      - "scripts/ci/check_benchmark_budgets.py"
      - "docs/quality/benchmark_budgets.toml"
      - ".github/workflows/benchmark.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs; never cancel a scheduled regression sweep.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  suite-performance-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Run suite benchmarks
        run: make benchmark-suite

      - name: Check benchmark budgets
        run: make benchmark-budget-check

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frtb-capital-suite-benchmarks
          path: dist/benchmarks/*.json
