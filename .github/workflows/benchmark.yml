name: Benchmark

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  frtb-ima-target-scale:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Run target-scale benchmark
        run: make benchmark

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: frtb-ima-target-scale-benchmark
          path: dist/benchmarks/frtb-ima-target-scale.json
