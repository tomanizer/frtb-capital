name: Release Artifacts

on:
  push:
    tags:
      - "suite-v*"
      - "frtb-*-v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release-artifacts:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync locked workspace
        run: uv sync --locked --python 3.11

      - name: Build release artifacts
        run: make release-artifacts

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/release/*.whl
            dist/release/*.tar.gz
            dist/release/SHA256SUMS
            dist/release/release-checksums.json
            dist/sbom/frtb-capital.cdx.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frtb-capital-release-artifacts
          path: |
            dist/release/
            dist/sbom/frtb-capital.cdx.json

  publish-pypi:
    name: Publish PyPI distributions
    needs: build-release-artifacts
    if: startsWith(github.ref, 'refs/tags/suite-v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/frtb-capital/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: frtb-capital-release-artifacts
          path: dist

      - name: Prepare PyPI distribution directory
        run: |
          mkdir -p dist/pypi
          cp dist/release/*.whl dist/release/*.tar.gz dist/pypi/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi
