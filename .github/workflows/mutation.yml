name: Mutation

on:
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Run IMA mutation baseline
        run: make mutation

      - name: Run RRAO mutation baseline
        run: make mutation-rrao

      - name: Enforce mutation score floors
        run: make mutation-score-check

      - name: Upload mutation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-results
          path: dist/mutation
          if-no-files-found: error
