name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "47 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.classify.outputs.code }}
      dependency: ${{ steps.classify.outputs.dependency }}
      docs: ${{ steps.classify.outputs.docs }}
      examples: ${{ steps.classify.outputs.examples }}
      full: ${{ steps.classify.outputs.full }}
      notebooks: ${{ steps.classify.outputs.notebooks }}
      workflow: ${{ steps.classify.outputs.workflow }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: classify
        run: python3 scripts/ci/classify_changed_paths.py

  docs:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.docs == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check documentation links and registries
        run: make docs-check

  lint:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync workspace
        run: uv sync --locked

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

  typecheck:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync workspace
        run: uv sync --locked

      - name: Type check
        run: make typecheck

  test:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync workspace
        run: uv sync --locked --python ${{ matrix.python-version }}

      - name: Test
        env:
          HYPOTHESIS_PROFILE: ci
        run: make test

  build:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync workspace
        run: uv sync --locked

      - name: Build package artifacts
        run: make build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frtb-capital-package-build
          path: dist/release/

  dependency-audit:
    needs: changes
    if: ${{ needs.changes.outputs.dependency == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync workspace
        run: uv sync --locked

      - name: Audit dependencies
        run: make audit-deps

  sbom:
    needs: changes
    if: ${{ needs.changes.outputs.dependency == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync workspace
        run: uv sync --locked

      - name: Generate SBOM
        run: make sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: frtb-capital-sbom
          path: dist/sbom/

  examples:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.examples == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync workspace
        run: uv sync --locked

      - name: Run IMA demo
        run: uv run python packages/frtb-ima/examples/run_demo.py

  notebooks:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.notebooks == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync workspace and IMA notebooks extra
        run: uv sync --locked --package frtb-ima --extra notebooks

      - name: Build IMA validation pack
        working-directory: packages/frtb-ima
        run: MPLBACKEND=Agg uv run --no-sync pytest --nbmake notebooks

      - name: Upload validation pack
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ima-validation-pack
          path: packages/frtb-ima/build/validation/
          if-no-files-found: warn
