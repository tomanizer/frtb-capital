name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "47 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.classify.outputs.code }}
      dependency: ${{ steps.classify.outputs.dependency }}
      docs: ${{ steps.classify.outputs.docs }}
      examples: ${{ steps.classify.outputs.examples }}
      full: ${{ steps.classify.outputs.full }}
      notebooks: ${{ steps.classify.outputs.notebooks }}
      test: ${{ steps.classify.outputs.test }}
      workflow: ${{ steps.classify.outputs.workflow }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: classify
        run: python3 scripts/ci/classify_changed_paths.py

  docs:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.docs == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check documentation links and registries
        run: make docs-check

  lint:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

  typecheck:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Type check
        run: make typecheck

  quality-control:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11-quality-control

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Run quality-control gates
        run: make quality-control

      - name: Upload package maturity report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: package-maturity
          path: dist/quality/package-maturity.json
          if-no-files-found: ignore

      - name: Upload code drift report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-drift
          path: |
            dist/quality/code-drift-report.json
            dist/quality/changed-code-report.json
            dist/quality/test-value-report.json
            dist/quality/dead-code-report.json
          if-no-files-found: ignore

      - name: Upload docstring reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docstring-quality
          path: |
            dist/quality/docstring-inventory.json
            dist/quality/docstring-baseline-report.json
          if-no-files-found: ignore

  test:
    name: test (3.11)
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.test == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Test pull request changes
        if: ${{ github.event_name == 'pull_request' }}
        env:
          HYPOTHESIS_PROFILE: ci
        run: make test-changed

      - name: Test with coverage
        if: ${{ github.event_name != 'pull_request' }}
        env:
          HYPOTHESIS_PROFILE: ci
        run: make test

  test-compat:
    name: test (${{ matrix.python-version }})
    needs: changes
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py${{ matrix.python-version }}

      - name: Sync workspace
        run: uv sync --locked --python ${{ matrix.python-version }}

      - name: Test without coverage
        env:
          HYPOTHESIS_PROFILE: ci
        run: make test-no-cov

  build:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Build package artifacts
        run: make build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frtb-capital-package-build
          path: dist/release/

  dependency-audit:
    needs: changes
    if: ${{ needs.changes.outputs.dependency == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Audit dependencies
        run: make audit-deps

  sbom:
    needs: changes
    if: ${{ needs.changes.outputs.dependency == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Generate SBOM
        run: make sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: frtb-capital-sbom
          path: dist/sbom/

  examples:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.examples == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Run package demos
        run: make examples-check

  notebooks:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.notebooks == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11-notebooks

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Run notebook smoke checks
        run: make notebooks-check

  version-bump-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check no version bumps in non-release PRs
        run: python3 scripts/ci/check_version_bump.py

  uv-lock-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check uv.lock only changed with dependency-spec changes
        run: python3 scripts/ci/check_uv_lock_drift.py

  ci-required:
    needs:
      - changes
      - docs
      - lint
      - typecheck
      - quality-control
      - test
      - test-compat
      - build
      - dependency-audit
      - sbom
      - examples
      - notebooks
      - version-bump-guard
      - uv-lock-guard
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check CI job results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          QUALITY_CONTROL_RESULT: ${{ needs['quality-control'].result }}
          TEST_RESULT: ${{ needs.test.result }}
          TEST_COMPAT_RESULT: ${{ needs['test-compat'].result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPENDENCY_AUDIT_RESULT: ${{ needs['dependency-audit'].result }}
          SBOM_RESULT: ${{ needs.sbom.result }}
          EXAMPLES_RESULT: ${{ needs.examples.result }}
          NOTEBOOKS_RESULT: ${{ needs.notebooks.result }}
          VERSION_BUMP_GUARD_RESULT: ${{ needs['version-bump-guard'].result }}
          UV_LOCK_GUARD_RESULT: ${{ needs['uv-lock-guard'].result }}
        run: |
          failed=0

          # quality-control must always succeed — it runs unconditionally and
          # skipped means the job was somehow bypassed, which is a failure.
          case "$QUALITY_CONTROL_RESULT" in
            success)
              ;;
            *)
              echo "quality-control must succeed (got $QUALITY_CONTROL_RESULT)" >&2
              failed=1
              ;;
          esac

          # Guard jobs must always succeed (they self-skip on non-PR events).
          for guard_result in "$VERSION_BUMP_GUARD_RESULT" "$UV_LOCK_GUARD_RESULT"; do
            case "$guard_result" in
              success)
                ;;
              *)
                echo "a guard job failed or was cancelled (got $guard_result)" >&2
                failed=1
                ;;
            esac
          done

          # Conditional jobs are skipped when their changed-path filter did not
          # match; skipped is acceptable for these.
          for result in \
            "$CHANGES_RESULT" \
            "$DOCS_RESULT" \
            "$LINT_RESULT" \
            "$TYPECHECK_RESULT" \
            "$TEST_RESULT" \
            "$TEST_COMPAT_RESULT" \
            "$BUILD_RESULT" \
            "$DEPENDENCY_AUDIT_RESULT" \
            "$SBOM_RESULT" \
            "$EXAMPLES_RESULT" \
            "$NOTEBOOKS_RESULT"
          do
            case "$result" in
              success|skipped)
                ;;
              *)
                failed=1
                ;;
            esac
          done

          if [ "$failed" -ne 0 ]; then
            echo "One or more CI jobs failed or were cancelled." >&2
            exit 1
          fi

          echo "Required CI jobs passed or were intentionally skipped."
