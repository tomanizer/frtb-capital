name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "47 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.classify.outputs.code }}
      dependency: ${{ steps.classify.outputs.dependency }}
      docs: ${{ steps.classify.outputs.docs }}
      examples: ${{ steps.classify.outputs.examples }}
      full: ${{ steps.classify.outputs.full }}
      notebooks: ${{ steps.classify.outputs.notebooks }}
      workflow: ${{ steps.classify.outputs.workflow }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: classify
        run: python3 scripts/ci/classify_changed_paths.py

  docs:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.docs == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check documentation links and registries
        run: make docs-check

  lint:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

  typecheck:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Type check
        run: make typecheck

  quality-control:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11-quality-control

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Run quality-control gates
        run: make quality-control

      - name: Upload package maturity report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: package-maturity
          path: dist/quality/package-maturity.json
          if-no-files-found: ignore

  test:
    name: test (3.11)
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Test with coverage
        env:
          HYPOTHESIS_PROFILE: ci
        run: make test

  test-compat:
    name: test (${{ matrix.python-version }})
    needs: changes
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py${{ matrix.python-version }}

      - name: Sync workspace
        run: uv sync --locked --python ${{ matrix.python-version }}

      - name: Test without coverage
        env:
          HYPOTHESIS_PROFILE: ci
        run: make test-no-cov

  build:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Build package artifacts
        run: make build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frtb-capital-package-build
          path: dist/release/

  dependency-audit:
    needs: changes
    if: ${{ needs.changes.outputs.dependency == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Audit dependencies
        run: make audit-deps

  sbom:
    needs: changes
    if: ${{ needs.changes.outputs.dependency == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Generate SBOM
        run: make sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: frtb-capital-sbom
          path: dist/sbom/

  examples:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.examples == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11

      - name: Sync workspace
        run: uv sync --locked --python 3.11

      - name: Run IMA demo
        run: uv run python packages/frtb-ima/examples/run_demo.py

  notebooks:
    needs: changes
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.notebooks == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/*/pyproject.toml
          cache-suffix: py3.11-notebooks

      - name: Sync workspace and IMA notebooks extra
        run: uv sync --locked --python 3.11 --package frtb-ima --extra notebooks

      - name: Build IMA validation pack
        working-directory: packages/frtb-ima
        run: MPLBACKEND=Agg uv run --no-sync pytest --nbmake notebooks

      - name: Upload validation pack
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ima-validation-pack
          path: packages/frtb-ima/build/validation/
          if-no-files-found: warn

  ci-required:
    needs:
      - changes
      - docs
      - lint
      - typecheck
      - quality-control
      - test
      - test-compat
      - build
      - dependency-audit
      - sbom
      - examples
      - notebooks
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check CI job results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          QUALITY_CONTROL_RESULT: ${{ needs['quality-control'].result }}
          TEST_RESULT: ${{ needs.test.result }}
          TEST_COMPAT_RESULT: ${{ needs['test-compat'].result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPENDENCY_AUDIT_RESULT: ${{ needs['dependency-audit'].result }}
          SBOM_RESULT: ${{ needs.sbom.result }}
          EXAMPLES_RESULT: ${{ needs.examples.result }}
          NOTEBOOKS_RESULT: ${{ needs.notebooks.result }}
        run: |
          failed=0
          for result in \
            "$CHANGES_RESULT" \
            "$DOCS_RESULT" \
            "$LINT_RESULT" \
            "$TYPECHECK_RESULT" \
            "$QUALITY_CONTROL_RESULT" \
            "$TEST_RESULT" \
            "$TEST_COMPAT_RESULT" \
            "$BUILD_RESULT" \
            "$DEPENDENCY_AUDIT_RESULT" \
            "$SBOM_RESULT" \
            "$EXAMPLES_RESULT" \
            "$NOTEBOOKS_RESULT"
          do
            case "$result" in
              success|skipped)
                ;;
              *)
                failed=1
                ;;
            esac
          done

          if [ "$failed" -ne 0 ]; then
            echo "One or more CI jobs failed or were cancelled." >&2
            exit 1
          fi

          echo "Required CI jobs passed or were intentionally skipped."
