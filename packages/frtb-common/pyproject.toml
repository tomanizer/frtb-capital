[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "frtb-common"
version = "0.1.1"
description = "Shared primitives for the frtb-capital package suite"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "pyarrow>=23.0.1,<24",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
frtb_common = ["py.typed"]

[tool.towncrier]
package = "frtb_common"
package_dir = "src"
filename = "CHANGELOG.md"
directory = "changelog.d"
title_format = "## [{version}] - {project_date}"
issue_format = "#{issue}"
underlines = ["", "", ""]

[[tool.towncrier.type]]
directory = "fix"
name = "Fixed"
showcontent = true

[[tool.towncrier.type]]
directory = "feat"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "breaking"
name = "Breaking Changes"
showcontent = true

[[tool.towncrier.type]]
directory = "security"
name = "Security"
showcontent = true

[[tool.towncrier.type]]
directory = "chore"
name = "Changed"
showcontent = true

[[tool.towncrier.type]]
directory = "docs"
name = "Documentation"
showcontent = true
