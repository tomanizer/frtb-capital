[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "frtb-drc"
version = "0.1.4"
description = "FRTB Standardised Approach default risk charge scaffold"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "frtb-common",
]

[tool.setuptools.packages.find]
where = ["src"]
