[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "frtb-drc"
version = "0.1.0"
description = "FRTB Default Risk Charge (DRC) capital calculator prototype"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "numpy>=1.26,<2.5",
]

[project.optional-dependencies]
dev = [
    "mypy>=2.1,<2.2",
    "pytest>=9.0,<9.1",
    "pytest-cov>=7.1,<7.2",
    "ruff>=0.15,<0.16",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "N", "RUF", "T20"]

[tool.ruff.lint.per-file-ignores]
"examples/*.py" = ["T201", "E501", "RUF002"]
"scripts/*.py" = ["T201"]
# Tolerate RUF002 (en-dashes in regulatory citations e.g. MAR22.8–22.14, × symbols) and E501 (long synthetic Position / test data lines) in library + test code.
# Mirrors root pyproject.toml drc exceptions; package-local config is authoritative for `make lint` / CI on this package.
"tests/*.py" = ["E501", "RUF002"]
"src/frtb_drc/*.py" = ["RUF002"]

[tool.mypy]
python_version = "3.11"
strict = true

[tool.coverage.report]
fail_under = 85
show_missing = true
