[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "frtb-navigator"
version = "0.1.0"
description = "Read-only Navigator application for FRTB capital result inspection"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "fastapi>=0.115,<1",
    "frtb-common",
    "frtb-drc",
    "frtb-ima",
    "frtb-orchestration",
    "frtb-result-store[duckdb]",
    "frtb-rrao",
    "frtb-sbm",
]

[project.optional-dependencies]
server = ["uvicorn>=0.34,<1"]

[project.scripts]
frtb-navigator = "frtb_navigator.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
frtb_navigator = ["py.typed"]

[tool.towncrier]
package = "frtb_navigator"
package_dir = "src"
filename = "CHANGELOG.md"
directory = "changelog.d"
title_format = "## [{version}] - {project_date}"
issue_format = "#{issue}"
underlines = ["", "", ""]

[[tool.towncrier.type]]
directory = "fix"
name = "Fixed"
showcontent = true

[[tool.towncrier.type]]
directory = "feat"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "breaking"
name = "Breaking Changes"
showcontent = true

[[tool.towncrier.type]]
directory = "security"
name = "Security"
showcontent = true

[[tool.towncrier.type]]
directory = "chore"
name = "Changed"
showcontent = true

[[tool.towncrier.type]]
directory = "docs"
name = "Documentation"
showcontent = true
