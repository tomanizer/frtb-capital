[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "frtb-orchestration"
version = "0.2.1a1"
description = "Suite-level capital orchestration for frtb-capital"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "frtb-common>=0.1.2a1,<0.2",
    "frtb-cva>=0.1.1a1,<0.2",
    "frtb-drc>=0.1.8a1,<0.2",
    "frtb-ima>=0.1.1a1,<0.2",
    "frtb-rrao>=0.12.2a1,<0.13",
    "frtb-sbm>=0.8.1a1,<0.9",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.towncrier]
package = "frtb_orchestration"
package_dir = "src"
filename = "CHANGELOG.md"
directory = "changelog.d"
title_format = "## [{version}] - {project_date}"
issue_format = "#{issue}"
underlines = ["", "", ""]

[[tool.towncrier.type]]
directory = "fix"
name = "Fixed"
showcontent = true

[[tool.towncrier.type]]
directory = "feat"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "breaking"
name = "Breaking Changes"
showcontent = true

[[tool.towncrier.type]]
directory = "security"
name = "Security"
showcontent = true

[[tool.towncrier.type]]
directory = "chore"
name = "Changed"
showcontent = true

[[tool.towncrier.type]]
directory = "docs"
name = "Documentation"
showcontent = true
