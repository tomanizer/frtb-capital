[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "frtb-orchestration"
version = "0.2.1"
description = "Suite-level orchestration scaffold for frtb-capital"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "frtb-common",
    "frtb-cva",
    "frtb-drc",
    "frtb-ima",
    "frtb-rrao",
    "frtb-sbm",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.towncrier]
package = "frtb_orchestration"
package_dir = "src"
filename = "CHANGELOG.md"
directory = "changelog.d"
title_format = "## [{version}] - {project_date}"
issue_format = "#{issue}"
underlines = ["", "", ""]

[[tool.towncrier.type]]
directory = "fix"
name = "Fixed"
showcontent = true

[[tool.towncrier.type]]
directory = "feat"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "breaking"
name = "Breaking Changes"
showcontent = true

[[tool.towncrier.type]]
directory = "security"
name = "Security"
showcontent = true

[[tool.towncrier.type]]
directory = "chore"
name = "Changed"
showcontent = true

[[tool.towncrier.type]]
directory = "docs"
name = "Documentation"
showcontent = true
