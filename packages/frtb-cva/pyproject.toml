[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "frtb-cva"
version = "0.1.0"
description = "FRTB Credit Valuation Adjustment capital scaffold"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "frtb-common",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
pythonpath = ["../..", "."]
norecursedirs = [".*", "build", "dist", "mutants"]
markers = [
    "regulatory_ref(id): links a test to a regulatory requirement or source-crosswalk id",
    "challenger_ref(id): links a test to an external challenger implementation",
]

[tool.mutmut]
paths_to_mutate = [
    "src/frtb_cva/ba_cva.py",
    "src/frtb_cva/capital.py",
    "src/frtb_cva/kernel/ba_full.py",
    "src/frtb_cva/kernel/ba_reduced.py",
    "src/frtb_cva/kernel/sa.py",
    "src/frtb_cva/risk_classes/ccs.py",
    "src/frtb_cva/risk_classes/commodity.py",
    "src/frtb_cva/risk_classes/equity.py",
    "src/frtb_cva/risk_classes/fx.py",
    "src/frtb_cva/risk_classes/girr.py",
    "src/frtb_cva/risk_classes/rcs.py",
    "src/frtb_cva/sa_cva.py",
    "src/frtb_cva/weighted_sensitivity.py",
]
pytest_add_cli_args_test_selection = [
    "tests/test_cva_ba_cva_full.py",
    "tests/test_cva_ba_cva_reduced.py",
    "tests/test_cva_ba_cva_standalone.py",
    "tests/test_cva_properties.py",
    "tests/test_cva_sa_cva.py",
    "tests/test_cva_weighted_sensitivity.py",
]
pytest_add_cli_args = [
    "-c",
    "pyproject.toml",
    "-p",
    "no:cov",
]
do_not_mutate = [
    "src/frtb_cva/adapters",
    "src/frtb_cva/arrow_batch.py",
    "src/frtb_cva/audit.py",
    "src/frtb_cva/batch.py",
    "src/frtb_cva/crif.py",
    "src/frtb_cva/reference_data.py",
]
also_copy = [
    "src/frtb_cva",
    "tests",
]
mutate_only_covered_lines = true

[tool.towncrier]
package = "frtb_cva"
package_dir = "src"
filename = "CHANGELOG.md"
directory = "changelog.d"
title_format = "## [{version}] - {project_date}"
issue_format = "#{issue}"
underlines = ["", "", ""]

[[tool.towncrier.type]]
directory = "fix"
name = "Fixed"
showcontent = true

[[tool.towncrier.type]]
directory = "feat"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "breaking"
name = "Breaking Changes"
showcontent = true

[[tool.towncrier.type]]
directory = "security"
name = "Security"
showcontent = true

[[tool.towncrier.type]]
directory = "chore"
name = "Changed"
showcontent = true

[[tool.towncrier.type]]
directory = "docs"
name = "Documentation"
showcontent = true
