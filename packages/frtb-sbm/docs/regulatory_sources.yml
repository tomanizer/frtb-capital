    status: final_rule_reference
    reuse_note: "Final UK PRA source map. Articles 325c, 325h, and 325ae-325ag now support the PRA_UK_CRR GIRR delta runtime slice with profile-owned citations and girr_delta_pra_uk_crr_v1 fixtures; remaining runtime cells still need profile-owned citation ids, reference data, fixtures, and support-matrix updates."
