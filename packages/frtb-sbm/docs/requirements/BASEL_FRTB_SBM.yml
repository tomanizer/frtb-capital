schema_version: 1
name: BASEL_FRTB_SBM
module: frtb-sbm
status_values: [planned, implemented, partial, unsupported, out_of_scope]
source_register:
  - name: Basel MAR20
    url: https://www.bis.org/basel_framework/chapter/MAR/20.htm
  - name: Basel MAR21
    url: https://www.bis.org/basel_framework/chapter/MAR/21.htm
  - name: U.S. NPR 2.0 91 FR 14952
    url: https://www.govinfo.gov/app/details/FR-2026-03-27/2026-05959
  - name: CRR3 Regulation (EU) 2024/1623
    url: https://eur-lex.europa.eu/eli/reg/2024/1623/oj/eng
requirements:
  - id: SBM-DATA-001
    title: Frozen SBM sensitivity and result models
    source: Basel MAR21.1-MAR21.8; U.S. NPR 2.0 section V.A.7.a
    status: implemented
    modules: [src/frtb_sbm/data_models.py]
    tests: [tests/test_sbm_data_models.py]
    notes: Sensitivity, weighted sensitivity, bucket capital, risk-class capital, and total result.
  - id: SBM-REF-001
    title: Risk-class, bucket, risk-weight, tenor, and correlation reference data
    source: Basel MAR21 risk-class tables; CRR3 Articles 325e-325az
    status: partial
    modules: [src/frtb_sbm/reference_data.py]
    tests: [tests/test_sbm_reference_data.py]
    notes: GIRR, FX, equity, commodity, and CSR delta, vega, and curvature tables are cited for BASEL_MAR21; US_NPR_2_0 and PRA_UK_CRR GIRR delta are implemented under audit with profile-owned citations, while other non-Basel cells remain planned and runtime fail-closed.
  - id: SBM-RISK-001
    title: Seven-risk-class coverage
    source: Basel MAR21; 91 FR 15037
    status: partial
    modules: [src/frtb_sbm/risk_classes]
    tests: [tests/test_sbm_support_matrix.py, tests/risk_classes/test_sbm_fx.py, tests/risk_classes/test_equity.py, tests/risk_classes/test_commodity.py, tests/risk_classes/test_csr_nonsec.py, tests/risk_classes/test_csr_sec_nonctp.py, tests/risk_classes/test_csr_sec_ctp.py]
    notes: GIRR, FX, equity, commodity, CSR non-sec, CSR sec non-CTP, and CSR sec CTP delta, vega, and curvature are implemented under BASEL_MAR21 with row, batch, and Arrow batch paths.
  - id: SBM-WS-001
    title: Weighted sensitivity calculation
    source: Basel MAR21 risk-weight provisions; U.S. NPR 2.0 section V.A.7.a step three
    status: implemented
    modules: [src/frtb_sbm/weighted_sensitivity.py]
    tests: [tests/test_sbm_weighted_sensitivity.py, tests/test_sbm_girr_vega.py, tests/test_sbm_non_girr_vega.py, tests/risk_classes/test_sbm_fx.py]
    notes: GIRR delta/vega, non-GIRR vega, and supported delta cited weighting for BASEL_MAR21.
  - id: SBM-AGG-001
    title: Intra-bucket aggregation
    source: Basel MAR21 aggregation formulas; U.S. NPR 2.0 section V.A.7.a step four
    status: implemented
    modules: [src/frtb_sbm/aggregation.py]
    tests: [tests/test_sbm_aggregation.py]
    notes: Preserve pairwise correlation details for audit.
  - id: SBM-AGG-002
    title: Inter-bucket and correlation-scenario aggregation
    source: Basel MAR21 aggregation formulas; U.S. NPR 2.0 section V.A.7.a steps five and six
    status: implemented
    modules: [src/frtb_sbm/aggregation.py]
    tests: [tests/test_sbm_correlation_scenarios.py]
    notes: Recomputes intra- and inter-bucket capital under MAR21.6 scenarios for supported slices.
  - id: SBM-CURV-001
    title: Curvature capital
    source: Basel MAR21.5 and MAR21.96-MAR21.101; 91 FR 15037 footnote 328
    status: implemented
    modules: [src/frtb_sbm/curvature.py]
    tests: [tests/test_curvature.py, tests/test_sbm_curvature_batch_arrow.py, tests/test_sbm_portfolio_batch_dispatcher.py]
    notes: Curvature capital is implemented across supported BASEL_MAR21 SBM risk classes, including explicit MAR21.98 FX scalar marking, row/batch parity, and Arrow batch coverage.
  - id: SBM-CRIF-001
    title: CRIF-to-canonical mapping
    source: ISDA CRIF field convention; implementation support requirement
    status: implemented
    modules: [src/frtb_sbm/crif.py]
    tests: [tests/test_sbm_crif.py]
    notes: Row-dict CRIF-to-canonical mapping covers supported BASEL_MAR21 delta, vega, and curvature paths with auditable rejects. GIRR delta also has a CRIF-to-Arrow batch. Calculation kernels do not depend on CSV or dataframe libraries.
  - id: SBM-AUDIT-001
    title: Audit and Euler-compatible reports
    source: Basel MAR21 component traceability by formula
    status: partial
    modules: [src/frtb_sbm/audit.py, src/frtb_sbm/attribution.py, src/frtb_sbm/impact.py, src/frtb_sbm/capital.py]
    tests: [tests/test_sbm_audit.py, tests/test_sbm_replay.py, tests/test_sbm_fixture_workflow.py, tests/test_sbm_attribution_impact.py, tests/risk_classes/test_sbm_fx.py]
    notes: Serializes run context, scenario evidence, and branch metadata for supported BASEL_MAR21 delta, vega, and curvature slices. Delta and vega attribution emits analytical Euler CapitalContribution records for selected differentiable branches; curvature and non-differentiable or incomplete-evidence paths emit explicit unsupported residuals. Baseline-vs-candidate impact is finite difference.
