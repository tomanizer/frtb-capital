[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "frtb-sbm"
version = "0.8.0"
description = "FRTB Standardised Approach sensitivities-based method (Basel MAR21 delta, GIRR vega, and curvature slices)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "frtb-common",
    "numpy>=1.26,<2.5",
    "pyarrow>=23.0.1,<24",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
pythonpath = ["../..", "."]
norecursedirs = [".*", "build", "dist", "mutants"]
markers = [
    "regulatory_ref(id): links a test to a regulatory requirement or source-crosswalk id",
    "challenger_ref(id): links a test to an external challenger implementation",
]

[tool.mutmut]
paths_to_mutate = [
    "src/frtb_sbm/capital.py",
    "src/frtb_sbm/curvature.py",
    "src/frtb_sbm/weighted_sensitivity.py",
]
pytest_add_cli_args_test_selection = [
    "tests/test_curvature.py",
    "tests/test_sbm_girr_vega.py",
    "tests/test_sbm_multi_class_portfolio.py",
    "tests/test_sbm_weighted_sensitivity.py",
]
pytest_add_cli_args = [
    "-c",
    "pyproject.toml",
    "-p",
    "no:cov",
]
do_not_mutate = [
    "src/frtb_sbm/adapters",
    "src/frtb_sbm/arrow_batch.py",
    "src/frtb_sbm/audit.py",
    "src/frtb_sbm/batch.py",
    "src/frtb_sbm/crif.py",
    "src/frtb_sbm/reference_data.py",
]
also_copy = [
    "src/frtb_sbm",
    "tests",
]
mutate_only_covered_lines = true

[tool.towncrier]
package = "frtb_sbm"
package_dir = "src"
filename = "CHANGELOG.md"
directory = "changelog.d"
title_format = "## [{version}] - {project_date}"
issue_format = "#{issue}"
underlines = ["", "", ""]

[[tool.towncrier.type]]
directory = "fix"
name = "Fixed"
showcontent = true

[[tool.towncrier.type]]
directory = "feat"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "breaking"
name = "Breaking Changes"
showcontent = true

[[tool.towncrier.type]]
directory = "security"
name = "Security"
showcontent = true

[[tool.towncrier.type]]
directory = "chore"
name = "Changed"
showcontent = true

[[tool.towncrier.type]]
directory = "docs"
name = "Documentation"
showcontent = true
