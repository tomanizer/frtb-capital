[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "frtb-sbm"
version = "0.6.1"
description = "FRTB Standardised Approach sensitivities-based method (GIRR, FX, equity, and commodity delta slice)"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "frtb-common",
    "numpy>=1.26,<2.5",
]

[tool.setuptools.packages.find]
where = ["src"]
