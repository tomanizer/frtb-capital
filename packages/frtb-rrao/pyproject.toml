[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "frtb-rrao"
version = "0.12.1"
description = "FRTB Standardised Approach residual risk add-on"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "frtb-common",
]

[project.optional-dependencies]
dev = [
    "hypothesis>=6.152,<6.153",
    "mutmut>=3.5,<3.6",
    "mypy>=2.1,<2.2",
    "pytest>=9.0,<9.1",
    "pytest-cov>=7.1,<7.2",
    "ruff>=0.15,<0.16",
]
notebooks = [
    "jupyter>=1.1,<1.2",
    "matplotlib>=3.10,<3.11",
    "nbmake>=1.5,<1.6",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "N", "RUF", "T20"]

[tool.ruff.lint.per-file-ignores]
"examples/*.py" = ["T201"]
"scripts/*.py" = ["T201"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
norecursedirs = [".*", "build", "dist", "mutants"]

[tool.mutmut]
paths_to_mutate = [
    "src/frtb_rrao/audit.py",
    "src/frtb_rrao/capital.py",
    "src/frtb_rrao/classification.py",
    "src/frtb_rrao/validation.py",
]
pytest_add_cli_args_test_selection = [
    "tests/test_rrao_audit.py",
    "tests/test_rrao_capital.py",
    "tests/test_rrao_classification.py",
    "tests/test_rrao_exclusions.py",
    "tests/test_rrao_external_comparator.py",
    "tests/test_rrao_fixture_workflow.py",
    "tests/test_rrao_investment_fund.py",
    "tests/test_rrao_org_scope.py",
    "tests/test_rrao_properties.py",
    "tests/test_rrao_reconciliation_tolerance.py",
    "tests/test_rrao_validation.py",
]
pytest_add_cli_args = [
    "-c",
    "pyproject.toml",
    "-p",
    "no:cov",
]
do_not_mutate = [
    "src/frtb_rrao/crif.py",
    "src/frtb_rrao/reference_data.py",
    "src/frtb_rrao/regimes.py",
]
also_copy = [
    "src/frtb_rrao",
    "tests",
]
mutate_only_covered_lines = true

[tool.towncrier]
package = "frtb_rrao"
package_dir = "src"
filename = "CHANGELOG.md"
directory = "changelog.d"
title_format = "## [{version}] - {project_date}"
issue_format = "#{issue}"
underlines = ["", "", ""]

[[tool.towncrier.type]]
directory = "fix"
name = "Fixed"
showcontent = true

[[tool.towncrier.type]]
directory = "feat"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "breaking"
name = "Breaking Changes"
showcontent = true

[[tool.towncrier.type]]
directory = "security"
name = "Security"
showcontent = true

[[tool.towncrier.type]]
directory = "chore"
name = "Changed"
showcontent = true

[[tool.towncrier.type]]
directory = "docs"
name = "Documentation"
showcontent = true
