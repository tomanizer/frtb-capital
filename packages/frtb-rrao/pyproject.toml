[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "frtb-rrao"
version = "0.10.0"
description = "FRTB Standardised Approach residual risk add-on"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "frtb-common",
]

[tool.setuptools.packages.find]
where = ["src"]
