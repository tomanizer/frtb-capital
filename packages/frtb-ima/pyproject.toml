[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "frtb-ima"
version = "0.1.0"
description = "NPR 2.0-style FRTB IMA capital calculator prototype"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "numpy>=1.26,<2.5",
]

[project.optional-dependencies]
dev = [
    "hypothesis>=6.152,<6.153",
    "mutmut>=3.5,<3.6",
    "mypy>=2.1,<2.2",
    "pytest>=9.0,<9.1",
    "pytest-cov>=7.1,<7.2",
    "ruff>=0.15,<0.16",
]
notebooks = [
    "jupyter>=1.1,<1.2",
    "matplotlib>=3.10,<3.11",
    "nbmake>=1.5,<1.6",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
norecursedirs = [".*", "build", "dist", "mutants"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "N", "RUF", "T20"]

[tool.ruff.lint.per-file-ignores]
"examples/*.py" = ["T201"]

[tool.mypy]
python_version = "3.11"
strict = true

[tool.coverage.report]
fail_under = 90
show_missing = true
omit = ["*/demo_data.py"]

[tool.mutmut]
paths_to_mutate = [
    "src/frtb_ima/expected_shortfall.py",
    "src/frtb_ima/liquidity_horizon.py",
    "src/frtb_ima/imcc.py",
    "src/frtb_ima/nmrf.py",
    "src/frtb_ima/pla.py",
    "src/frtb_ima/capital.py",
    "src/frtb_ima/reduced_set.py",
]
pytest_add_cli_args_test_selection = [
    "tests/test_expected_shortfall.py",
    "tests/test_liquidity_horizon.py",
    "tests/test_imcc.py",
    "tests/test_nmrf.py",
    "tests/test_pla.py",
    "tests/test_capital.py",
    "tests/test_reduced_set.py",
    "tests/test_properties_es.py",
    "tests/test_properties_lha_imcc_nmrf.py",
    "tests/test_properties_pla.py",
    "tests/test_properties_capital.py",
]
pytest_add_cli_args = [
    "-c",
    "pyproject.toml",
    "-p",
    "no:cov",
]
do_not_mutate = [
    "src/frtb_ima/demo_data.py",
    "src/frtb_ima/audit.py",
    "src/frtb_ima/logging.py",
]
also_copy = [
    "src/frtb_ima",
    "tests",
]
mutate_only_covered_lines = true
